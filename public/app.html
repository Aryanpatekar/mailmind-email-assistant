<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MailMind - Intelligent Email Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
  
  <div class="app-container">
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    
    <!-- TOP NAVIGATION BAR -->
    <nav class="top-nav glass-panel">
      <div class="nav-left">
        <a href="/" class="logo-link">
          <i data-feather="mail" class="icon-md"></i>
          <span class="logo-text">MailMind</span>
        </a>
        <span class="badge active" style="margin-left: 12px; font-size: 0.65rem;">BETA</span>
      </div>
      <div class="nav-right">
        <button class="icon-toggle" title="Home" onclick="location.href='/'">
          <i data-feather="home"></i>
        </button>
        <button class="icon-toggle" title="Settings">
          <i data-feather="settings"></i>
        </button>
        <button class="icon-toggle" title="Profile">
          <i data-feather="user"></i>
        </button>
      </div>
    </nav>

    <div class="main-layout">
      <!-- LEFT SIDEBAR: HISTORY -->
      <aside class="sidebar glass-panel">
        <div class="sidebar-header">
          <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <h2 class="sidebar-title"><i data-feather="clock"></i> Recent History</h2>
            <select id="history-filter-select" class="history-select">
              <option value="all">All</option>
              <option value="sent">Sent</option>
              <option value="draft">Drafts</option>
            </select>
          </div>
        </div>
        
        <div class="history-list" id="history-container">
          <!-- History items injected here -->
        </div>
      </aside>

      <!-- MAIN WORKSPACE -->
      <main class="workspace">
        <!-- TOP CONTROL PANEL -->
        <section class="control-panel glass-panel">
          <div class="input-group">
            <label for="intent-input"><i data-feather="edit-3"></i> What do you want to say?</label>
            <textarea id="intent-input" placeholder="e.g. Draft a sick leave to HR asking for 2 days off because of a fever..." rows="3"></textarea>
          </div>
          
          <div class="input-row">
            <div class="input-group flex-1">
              <label for="receiver-email"><i data-feather="at-sign"></i> Recipient Email</label>
              <input type="email" id="receiver-email" placeholder="hr@company.com">
            </div>
          </div>

          <div class="controls-row">
            <div class="tone-selector">
              <label class="sr-only">Tone</label>
              <div class="chip-group" id="tone-chips">
                <button class="chip active" data-tone="formal"><i data-feather="briefcase" class="icon-sm"></i> Formal</button>
                <button class="chip" data-tone="polite"><i data-feather="smile" class="icon-sm"></i> Polite</button>
                <button class="chip" data-tone="friendly"><i data-feather="coffee" class="icon-sm"></i> Friendly</button>
                <button class="chip" data-tone="neutral"><i data-feather="align-left" class="icon-sm"></i> Neutral</button>
              </div>
            </div>
            <button id="btn-generate" class="btn-primary glow-effect">
              <i data-feather="zap"></i> Generate Draft
            </button>
          </div>
        </section>

        <!-- MAIN EDITOR CARD -->
        <section class="editor-section glass-panel">
          <div class="editor-header">
            <div class="editor-meta">
              <h2><i data-feather="monitor"></i> Draft Preview</h2>
              <span class="badge" id="detected-receiver-badge">Receiver: Unknown</span>
            </div>
            <div class="status-indicator" id="loading-indicator" style="display: none;">
              <div class="spinner"></div>
              <span>AI is writing...</span>
            </div>
          </div>

          <div class="editor-body">
            <input type="text" id="draft-subject" placeholder="Subject Line" readonly class="subject-input">
            <textarea id="draft-body" placeholder="Your AI-generated professional email will appear here..." readonly class="body-textarea"></textarea>
          </div>
          
          <div class="editor-actions">
            <div class="action-left">
              <button id="btn-regenerate" class="btn-secondary" disabled>
                <i data-feather="refresh-cw"></i> Regenerate
              </button>
            </div>
            <div class="action-right">
              <button id="btn-send" class="btn-primary glow-effect" disabled>
                <i data-feather="send"></i> Approve & Send
              </button>
            </div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script>
    feather.replace();
  </script>
</body>
</html>
